<!doctype html>
<html lang="en">
<head>
  <meta http-equiv="content-type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#79b7e7" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/apple-touch-icon-114x114.png') }}" />
  <title>Lute offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      box-sizing: border-box;
      padding: calc(1.5rem + env(safe-area-inset-top, 0px)) 1.5rem calc(1.5rem + env(safe-area-inset-bottom, 0px));
      color: #111;
      background: #fff;
      font: 100%/1.4 "Lucida Grande", Arial, sans-serif;
    }

    main {
      max-width: 28rem;
      text-align: center;
    }

    img {
      width: 5rem;
      height: auto;
      margin-bottom: 1.25rem;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.6rem;
      line-height: 1.15;
    }

    p {
      margin: 0 0 1.2rem;
    }

    a {
      display: inline-block;
      min-height: 44px;
      box-sizing: border-box;
      padding: 0.7rem 1rem;
      border-radius: 4px;
      color: #fff;
      background: #2f8fca;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <img src="{{ url_for('static', filename='img/lute.png') }}" alt="Lute" />
    <h1>Lute is offline</h1>
    <p>This installed app still needs a connection to load your books and terms.</p>
    <a href="/">Try again</a>
  </main>
</body>
</html>
